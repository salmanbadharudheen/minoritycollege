services:
  - type: web
    name: minority-college
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn minoritycollege.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,minoritycollege.com,www.minoritycollege.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,https://minoritycollege.com,https://www.minoritycollege.com"
      - key: DATABASE_URL
        fromDatabase:
          name: minority-college-db
          property: connectionString

databases:
  - name: minority-college-db
    plan: free
